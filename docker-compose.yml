services:
  bot:
    build: .
    container_name: study-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # 로컬 SQLite 데이터 영속화 (호스트 ./data <-> 컨테이너 /app/data)
      - ./data:/app/data
    expose:
      - "3000"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: study-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - bot
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
