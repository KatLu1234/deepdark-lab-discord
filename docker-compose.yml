services:
  bot:
    build: .
    container_name: study-bot
    restart: unless-stopped
    env_file:
      - .env
    # 컨테이너에서 호스트(EC2)의 PostgreSQL 에 접근할 때 host.docker.internal 로 연결.
    # 이 경우 .env 의 PGHOST 를 host.docker.internal 로 설정하세요.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "3000"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: study-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - bot
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
